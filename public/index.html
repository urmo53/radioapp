<!DOCTYPE html>
<html lang="et">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RadioApp</title>

<style>
body {
  font-family: -apple-system;
  margin:0;
  background:#fafafa;
  color:#111;
  transition:0.3s;
}

body.dark {
  background:#121212;
  color:#eee;
}

h1 {
  text-align:center;
  margin:20px 0;
}

/* GRID */
.grid {
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:20px;
  max-width:960px;
  margin:auto;
}

/* CARD */
.station {
  background:#fff;
  border-radius:20px;
  padding:10px;
  text-align:center;
  cursor:pointer;
}

body.dark .station {
  background:#1e1e1e;
}

/* IMAGE FIX */
.img-wrapper {
  width:100%;
  aspect-ratio:1/1;
  overflow:hidden;
  border-radius:16px;
}

.img-wrapper img {
  width:100%;
  height:100%;
  object-fit:cover;
}

/* TEXT */
.station-title {
  font-size:13px;
  color:#666;
}

/* DETAIL */
.detail {
  display:none;
  text-align:center;
}

.detail img {
  width:90%;
  max-width:400px;
  border-radius:20px;
}

/* BACK */
.back {
  margin-top:20px;
  width:80px;
  height:80px;
  border-radius:50%;
  background:#007aff;
  color:#fff;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  font-weight:bold;
}

/* MOBILE */
@media(max-width:500px){
  .grid {
    grid-template-columns:repeat(2,1fr);
    padding:10px;
  }
}

</style>
</head>

<body>

<h1>RadioApp</h1>

<div id="grid" class="grid"></div>

<div id="detail" class="detail">
  <h2 id="name"></h2>
  <img id="art">
  <p id="title"></p>
  <div class="back" onclick="back()">BACK</div>
</div>

<audio id="audio" autoplay></audio>

<script>
let stations = [];
let cache = {};
let current = null;

function darkMode(){
  let h = new Date().getHours();
  if(h>=19 || h<7) document.body.classList.add("dark");
}
darkMode();

async function load(){
  let res = await fetch("/api/stations");
  stations = await res.json();

  stations.forEach(s=>cache[s.name]=s);

  render();
  updateDetail();
}

function render(){
  let g = document.getElementById("grid");
  g.innerHTML="";

  stations.forEach(s=>{
    let d = document.createElement("div");
    d.className="station";

    let img = s.artwork || "/images/"+s.name.toLowerCase()+".png";

    d.innerHTML = `
      <div class="img-wrapper">
        <img src="${img}">
      </div>
      <b>${s.name}</b>
      <div class="station-title">${s.title}</div>
    `;

    d.onclick=()=>open(s);
    g.appendChild(d);
  });
}

function open(s){
  current=s;

  document.getElementById("grid").style.display="none";
  document.getElementById("detail").style.display="block";

  updateDetail();

  let audio = document.getElementById("audio");
  audio.src = s.stream;
  audio.play();
}

function updateDetail(){
  if(!current) return;

  let s = cache[current.name];

  let img = s.artwork || "/images/"+s.name.toLowerCase()+".png";

  document.getElementById("name").innerText = s.name;
  document.getElementById("title").innerText = s.title;
  document.getElementById("art").src = img;

  if('mediaSession' in navigator){
    navigator.mediaSession.metadata = new MediaMetadata({
      title:s.title,
      artist:s.name,
      artwork:[{src:img,sizes:"400x400"}]
    });
  }
}

function back(){
  document.getElementById("detail").style.display="none";
  document.getElementById("grid").style.display="grid";
  current=null;
}

load();
setInterval(load,15000);
</script>

</body>
</html>
