<!DOCTYPE html>
<html lang="et">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RadioApp</title>

<link rel="preconnect" href="https://icecast.err.ee" crossorigin>

<style>
:root {
  --bg: linear-gradient(180deg, #f8f9fb 0%, #eef2f7 100%);
  --card: rgba(255, 255, 255, 0.78);
  --card-border: rgba(255, 255, 255, 0.85);
  --text: #111111;
  --text-secondary: #5f6672;
  --accent: #0a84ff;
  --accent-hover: #0066d6;
  --shadow: 0 10px 30px rgba(18, 34, 66, 0.08);
  --shadow-strong: 0 18px 40px rgba(18, 34, 66, 0.14);
  --blur: blur(18px);

  --dynamic-1: rgba(76, 146, 255, 0.10);
  --dynamic-2: rgba(155, 193, 255, 0.08);
  --dynamic-detail: rgba(255,255,255,0.45);
  --mini-player-bg: rgba(255,255,255,0.86);
}

body.dark {
  --bg: linear-gradient(180deg, #07111f 0%, #0b1930 35%, #102447 70%, #122a52 100%);
  --card: rgba(10, 25, 52, 0.65);
  --card-border: rgba(120, 170, 255, 0.10);
  --text: #edf4ff;
  --text-secondary: #a9bddc;
  --accent: #4da3ff;
  --accent-hover: #2d8eff;
  --shadow: 0 12px 34px rgba(0, 0, 0, 0.34);
  --shadow-strong: 0 20px 46px rgba(0, 0, 0, 0.42);
  --dynamic-1: rgba(77, 163, 255, 0.12);
  --dynamic-2: rgba(18, 90, 200, 0.16);
  --dynamic-detail: rgba(6, 16, 34, 0.55);
  --mini-player-bg: rgba(7, 17, 31, 0.88);
}

html, body {
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text",
               "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  text-rendering: optimizeLegibility;
}

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  min-height: 100vh;
  color: var(--text);
  background:
    radial-gradient(circle at top left, var(--dynamic-1), transparent 28%),
    radial-gradient(circle at top right, var(--dynamic-2), transparent 26%),
    var(--bg);
  transition: background 0.35s ease, color 0.35s ease;
}

.page {
  max-width: 1180px;
  margin: 0 auto;
  padding: 18px 20px 120px;
}

.hero {
  position: sticky;
  top: 0;
  z-index: 20;
  padding: 10px 0 12px;
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  background: linear-gradient(to bottom, rgba(255,255,255,0.55), rgba(255,255,255,0.18), transparent);
  transition: padding 0.22s ease, background 0.22s ease;
}

body.dark .hero {
  background: linear-gradient(to bottom, rgba(7,17,31,0.72), rgba(7,17,31,0.26), transparent);
}

.hero h1 {
  margin: 0;
  font-size: 32px;
  font-weight: 800;
  letter-spacing: -0.03em;
  transition: font-size 0.22s ease, transform 0.22s ease, opacity 0.22s ease;
}

body.scrolled .hero {
  padding: 6px 0 8px;
}

body.scrolled .hero h1 {
  font-size: 22px;
  opacity: 0.96;
}

.grid {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 22px;
}

.station {
  position: relative;
  overflow: hidden;
  border-radius: 28px;
  padding: 14px;
  background: var(--card);
  backdrop-filter: var(--blur);
  -webkit-backdrop-filter: var(--blur);
  border: 1px solid var(--card-border);
  box-shadow: var(--shadow);
  cursor: pointer;
  transition: transform 0.24s ease, box-shadow 0.24s ease, background 0.24s ease;
  touch-action: pan-y;
}

.station:hover {
  transform: translateY(-4px) scale(1.01);
  box-shadow: var(--shadow-strong);
}

.img-wrapper {
  width: 100%;
  aspect-ratio: 1 / 1;
  overflow: hidden;
  border-radius: 22px;
  background: #dcdce1;
}

body.dark .img-wrapper {
  background: #183158;
}

.img-wrapper img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}

.station-info {
  padding: 14px 6px 4px;
}

.station-name {
  font-size: 20px;
  font-weight: 700;
  letter-spacing: -0.02em;
  margin: 0 0 6px;
  line-height: 1.15;
}

.station-title {
  font-size: 14px;
  line-height: 1.35;
  color: var(--text-secondary);
  margin: 0;
  min-height: 38px;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.detail {
  display: none;
  max-width: 980px;
  margin: 0 auto;
}

.detail-shell {
  position: relative;
  overflow: hidden;
  display: grid;
  grid-template-columns: minmax(280px, 430px) minmax(280px, 1fr);
  gap: 34px;
  align-items: center;
  padding: 24px;
  border-radius: 34px;
  border: 1px solid var(--card-border);
  box-shadow: var(--shadow-strong);
  background: rgba(255,255,255,0.18);
  min-height: 420px;
}

.detail-bg {
  position: absolute;
  inset: 0;
  z-index: 0;
}

.detail-bg img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  transform: scale(1.15);
  filter: blur(40px) saturate(1.2) brightness(0.9);
  opacity: 0.95;
}

.detail-bg::after {
  content: "";
  position: absolute;
  inset: 0;
  background: var(--dynamic-detail);
}

.detail-overlay {
  position: absolute;
  inset: 0;
  z-index: 1;
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
}

.detail-art-wrap,
.detail-copy {
  position: relative;
  z-index: 2;
}

.detail-art-wrap {
  width: 100%;
  aspect-ratio: 1 / 1;
  border-radius: 30px;
  overflow: hidden;
  background: #dcdce1;
  box-shadow: 0 18px 44px rgba(0, 0, 0, 0.16);
}

body.dark .detail-art-wrap {
  background: #163056;
}

.detail-art-wrap img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}

.detail-copy {
  text-align: left;
}

.detail-label {
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 12px;
}

#name {
  margin: 0 0 12px;
  font-size: 46px;
  line-height: 0.95;
  font-weight: 800;
  letter-spacing: -0.05em;
}

#title {
  margin: 0 0 10px;
  font-size: 20px;
  line-height: 1.35;
  color: var(--text-secondary);
  font-weight: 500;
}

.player-status-wrap {
  display: flex;
  align-items: center;
  gap: 10px;
  margin: 0 0 26px;
}

.player-status {
  margin: 0;
  font-size: 14px;
  color: var(--text-secondary);
}

.live-waves {
  display: none;
  align-items: flex-end;
  gap: 3px;
  height: 16px;
}

.live-waves.active {
  display: inline-flex;
}

.live-waves span {
  width: 3px;
  border-radius: 999px;
  background: var(--accent);
  animation: liveWave 1s infinite ease-in-out;
}

.live-waves span:nth-child(1) { height: 6px; animation-delay: 0s; }
.live-waves span:nth-child(2) { height: 12px; animation-delay: 0.15s; }
.live-waves span:nth-child(3) { height: 8px; animation-delay: 0.3s; }
.live-waves span:nth-child(4) { height: 14px; animation-delay: 0.45s; }

@keyframes liveWave {
  0%, 100% { transform: scaleY(0.6); opacity: 0.7; }
  50% { transform: scaleY(1.25); opacity: 1; }
}

.detail-actions {
  display: flex;
  align-items: center;
  gap: 14px;
  flex-wrap: wrap;
}

.back {
  width: 92px;
  height: 92px;
  border-radius: 50%;
  background: var(--accent);
  color: #fff;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-weight: 800;
  font-size: 15px;
  letter-spacing: 0.06em;
  cursor: pointer;
  user-select: none;
  box-shadow: 0 14px 28px rgba(13, 118, 255, 0.30);
  transition: transform 0.2s ease, background 0.2s ease, box-shadow 0.2s ease;
}

.back:hover {
  transform: scale(1.05);
  background: var(--accent-hover);
}

.detail-note {
  font-size: 14px;
  color: var(--text-secondary);
  font-weight: 500;
}

audio {
  display: none;
}

/* bottom mini player */
.mini-player {
  position: fixed;
  left: 14px;
  right: 14px;
  bottom: 14px;
  z-index: 40;
  display: none;
  align-items: center;
  gap: 12px;
  padding: 10px 12px;
  border-radius: 22px;
  background: var(--mini-player-bg);
  border: 1px solid var(--card-border);
  box-shadow: var(--shadow-strong);
  backdrop-filter: blur(18px);
  -webkit-backdrop-filter: blur(18px);
}

.mini-player.show {
  display: flex;
}

.mini-player-art {
  width: 54px;
  height: 54px;
  border-radius: 14px;
  overflow: hidden;
  flex: 0 0 auto;
  background: #dcdce1;
}

body.dark .mini-player-art {
  background: #183158;
}

.mini-player-art img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}

.mini-player-copy {
  min-width: 0;
  flex: 1;
}

.mini-player-name {
  font-size: 14px;
  font-weight: 700;
  line-height: 1.2;
  margin-bottom: 3px;
}

.mini-player-title {
  font-size: 12px;
  color: var(--text-secondary);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.mini-player-actions {
  display: flex;
  align-items: center;
  gap: 8px;
}

.mini-btn {
  border: none;
  background: transparent;
  color: var(--text);
  font-size: 18px;
  cursor: pointer;
  width: 38px;
  height: 38px;
  border-radius: 999px;
}

.mini-btn:hover {
  background: rgba(127,127,127,0.12);
}

@media (max-width: 980px) {
  .hero h1 { font-size: 34px; }
  .grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
  .detail-shell { grid-template-columns: 1fr; gap: 22px; }
  .detail-copy { text-align: center; }
  .detail-actions { justify-content: center; }
  .player-status-wrap { justify-content: center; }
  #name { font-size: 38px; }
  #title { font-size: 18px; }
}

@media (max-width: 500px) {
  .page { padding: 14px 12px 110px; }
  .hero h1 { font-size: 28px; }
  body.scrolled .hero h1 { font-size: 20px; }
  .grid { grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 14px; }
  .station { border-radius: 20px; padding: 10px; }
  .img-wrapper { border-radius: 16px; }
  .station-info { padding: 10px 2px 2px; }
  .station-name { font-size: 15px; }
  .station-title { font-size: 12px; min-height: 32px; }
  .detail-shell { padding: 16px; border-radius: 24px; min-height: auto; }
  .detail-art-wrap { border-radius: 22px; }
  #name { font-size: 28px; }
  #title { font-size: 16px; }
  .player-status { font-size: 13px; }
  .player-status-wrap { margin-bottom: 18px; justify-content: center; }
  .back { width: 74px; height: 74px; font-size: 13px; }
  .detail-note { font-size: 13px; }
  .mini-player { left: 10px; right: 10px; bottom: 10px; padding: 9px 10px; }
  .mini-player-art { width: 48px; height: 48px; }
}
</style>
</head>

<body>

<div class="page">
  <div class="hero">
    <h1>RadioApp</h1>
  </div>

  <div id="grid" class="grid"></div>

  <div id="detail" class="detail">
    <div class="detail-shell">
      <div class="detail-bg">
        <img id="bgArt" alt="">
      </div>
      <div class="detail-overlay"></div>

      <div class="detail-art-wrap">
        <img id="art" alt="">
      </div>

      <div class="detail-copy">
        <div class="detail-label">Now Playing</div>
        <h2 id="name"></h2>
        <p id="title"></p>

        <div class="player-status-wrap">
          <p id="playerStatus" class="player-status">Ühendab striimiga…</p>
          <div id="liveWaves" class="live-waves" aria-hidden="true">
            <span></span><span></span><span></span><span></span>
          </div>
        </div>

        <div class="detail-actions">
          <div class="back" onclick="back()">BACK</div>
          <div class="detail-note"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<div id="miniPlayer" class="mini-player">
  <div class="mini-player-art">
    <img id="miniArt" alt="">
  </div>
  <div class="mini-player-copy" onclick="openCurrentDetail()" style="cursor:pointer;">
    <div id="miniName" class="mini-player-name"></div>
    <div id="miniTitle" class="mini-player-title"></div>
  </div>
  <div class="mini-player-actions">
    <button id="miniToggle" class="mini-btn" aria-label="Play/Pause">⏸</button>
  </div>
</div>

<audio id="audio" preload="auto" playsinline></audio>

<script>
let stations = [];
let cache = {};
let current = null;

const audio = document.getElementById("audio");
const playerStatus = document.getElementById("playerStatus");
const liveWaves = document.getElementById("liveWaves");

const miniPlayer = document.getElementById("miniPlayer");
const miniArt = document.getElementById("miniArt");
const miniName = document.getElementById("miniName");
const miniTitle = document.getElementById("miniTitle");
const miniToggle = document.getElementById("miniToggle");

let shouldBePlaying = false;
let reconnectTimer = null;
let reconnectAttempts = 0;

function darkMode() {
  const h = new Date().getHours();
  if (h >= 19 || h < 7) document.body.classList.add("dark");
  else document.body.classList.remove("dark");
}
darkMode();

function updateScrollHeader() {
  document.body.classList.toggle("scrolled", window.scrollY > 8);
}
window.addEventListener("scroll", updateScrollHeader, { passive: true });
updateScrollHeader();

function setStatus(text, isLive = false) {
  if (playerStatus) playerStatus.textContent = text;
  if (liveWaves) liveWaves.classList.toggle("active", isLive);
}

function clearReconnectTimer() {
  if (reconnectTimer) {
    clearTimeout(reconnectTimer);
    reconnectTimer = null;
  }
}

function scheduleReconnect(reason = "Katkestus") {
  if (!current || !shouldBePlaying) return;
  if (reconnectTimer) return;

  reconnectAttempts += 1;
  const delay = Math.min(700 * reconnectAttempts, 3000);

  setStatus(`${reason}. Proovin uuesti ${Math.max(1, Math.round(delay / 1000))} s pärast…`);

  reconnectTimer = setTimeout(() => {
    reconnectTimer = null;
    startStream(current, true);
  }, delay);
}

function rgbToCss(r, g, b, a = 0.18) {
  return `rgba(${r}, ${g}, ${b}, ${a})`;
}

function applyDynamicThemeFromImage(imgEl) {
  try {
    const canvas = document.createElement("canvas");
    const ctx = canvas.getContext("2d", { willReadFrequently: true });
    if (!ctx) return;

    const size = 32;
    canvas.width = size;
    canvas.height = size;
    ctx.drawImage(imgEl, 0, 0, size, size);

    const data = ctx.getImageData(0, 0, size, size).data;

    let r = 0, g = 0, b = 0, count = 0;

    for (let i = 0; i < data.length; i += 4) {
      const alpha = data[i + 3];
      if (alpha < 120) continue;
      r += data[i];
      g += data[i + 1];
      b += data[i + 2];
      count++;
    }

    if (!count) return;

    r = Math.round(r / count);
    g = Math.round(g / count);
    b = Math.round(b / count);

    const root = document.documentElement;
    root.style.setProperty("--dynamic-1", rgbToCss(r, g, b, 0.16));
    root.style.setProperty("--dynamic-2", rgbToCss(Math.max(0, r - 30), Math.max(0, g - 10), Math.min(255, b + 20), 0.18));

    if (document.body.classList.contains("dark")) {
      root.style.setProperty("--dynamic-detail", `rgba(${Math.max(0,r-80)}, ${Math.max(0,g-80)}, ${Math.max(0,b-80)}, 0.48)`);
    } else {
      root.style.setProperty("--dynamic-detail", `rgba(${Math.min(255,r+100)}, ${Math.min(255,g+100)}, ${Math.min(255,b+100)}, 0.36)`);
    }
  } catch {}
}

function updateMiniPlayer() {
  if (!current) {
    miniPlayer.classList.remove("show");
    return;
  }

  const s = cache[current.name] || current;
  const img = s.artwork || "/images/" + s.name.toLowerCase() + ".png";

  miniArt.src = img;
  miniArt.alt = s.name;
  miniName.textContent = s.name;
  miniTitle.textContent = s.title || "";
  miniToggle.textContent = audio.paused ? "▶" : "⏸";

  miniPlayer.classList.add("show");
}

async function startStream(station, isReconnect = false) {
  if (!station) return;

  current = station;
  shouldBePlaying = true;
  clearReconnectTimer();

  const streamUrl = station.stream;

  try {
    setStatus(isReconnect ? "Taastan live striimi…" : "Ühendan live striimiga…");

    if (!audio.src || audio.src !== streamUrl) {
      audio.src = streamUrl;
    }

    const playPromise = audio.play();
    if (playPromise && typeof playPromise.then === "function") {
      await playPromise;
    }
  } catch {
    setStatus("Automaatne taastamine ei õnnestunud. Proovin uuesti…");
    scheduleReconnect("Mängimine ei käivitunud");
  }

  updateMiniPlayer();
}

function stopRecovery() {
  shouldBePlaying = false;
  reconnectAttempts = 0;
  clearReconnectTimer();
}

async function load() {
  try {
    const res = await fetch("/api/stations");
    stations = await res.json();
    stations.forEach(s => cache[s.name] = s);
    render();
    updateDetail();
    updateMiniPlayer();
  } catch (e) {
    console.log("Load error:", e);
  }
}

function render() {
  const g = document.getElementById("grid");
  g.innerHTML = "";

  stations.forEach(s => {
    const d = document.createElement("div");
    d.className = "station";

    const img = s.artwork || "/images/" + s.name.toLowerCase() + ".png";

    d.innerHTML = `
      <div class="img-wrapper">
        <img src="${img}" alt="${s.name}">
      </div>
      <div class="station-info">
        <div class="station-name">${s.name}</div>
        <div class="station-title">${s.title}</div>
      </div>
    `;

    d.addEventListener("click", () => openStation(s));
    g.appendChild(d);
  });
}

function openStation(s) {
  const sameStation = current && current.name === s.name;

  current = s;
  document.getElementById("grid").style.display = "none";
  document.getElementById("detail").style.display = "block";

  updateDetail();

  if (!sameStation || audio.paused || !shouldBePlaying) {
    startStream(s, false);
  }

  updateMiniPlayer();
}

function openCurrentDetail() {
  if (!current) return;
  document.getElementById("grid").style.display = "none";
  document.getElementById("detail").style.display = "block";
  updateDetail();
}

function updateDetail() {
  if (!current) return;

  const s = cache[current.name];
  if (!s) return;

  const img = s.artwork || "/images/" + s.name.toLowerCase() + ".png";

  document.getElementById("name").textContent = s.name;
  document.getElementById("title").textContent = s.title;
  document.getElementById("art").src = img;
  document.getElementById("art").alt = s.name;
  document.getElementById("bgArt").src = img;
  document.getElementById("bgArt").alt = s.name;

  const probe = new Image();
  probe.crossOrigin = "anonymous";
  probe.onload = () => applyDynamicThemeFromImage(probe);
  probe.src = img;

  if ("mediaSession" in navigator) {
    navigator.mediaSession.metadata = new MediaMetadata({
      title: s.title,
      artist: s.name,
      album: "RadioApp",
      artwork: [
        { src: img, sizes: "96x96", type: "image/png" },
        { src: img, sizes: "192x192", type: "image/png" },
        { src: img, sizes: "400x400", type: "image/png" },
        { src: img, sizes: "512x512", type: "image/png" }
      ]
    });

    navigator.mediaSession.setActionHandler("play", async () => {
      shouldBePlaying = true;
      await startStream(current || s, true);
    });

    navigator.mediaSession.setActionHandler("pause", () => {
      stopRecovery();
      audio.pause();
      setStatus("Peatatud");
      updateMiniPlayer();
    });

    try {
      navigator.mediaSession.setActionHandler("stop", () => {
        stopRecovery();
        audio.pause();
        audio.removeAttribute("src");
        audio.load();
        setStatus("Peatatud");
        updateMiniPlayer();
      });
    } catch {}

    try {
      navigator.mediaSession.setActionHandler("seekbackward", null);
      navigator.mediaSession.setActionHandler("seekforward", null);
      navigator.mediaSession.setActionHandler("previoustrack", null);
      navigator.mediaSession.setActionHandler("nexttrack", null);
    } catch {}

    if ("playbackState" in navigator.mediaSession) {
      navigator.mediaSession.playbackState = shouldBePlaying && !audio.paused ? "playing" : "paused";
    }
  }
}

function back() {
  document.getElementById("detail").style.display = "none";
  document.getElementById("grid").style.display = "grid";
  updateMiniPlayer();
}

miniToggle.addEventListener("click", async (e) => {
  e.stopPropagation();

  if (!current) return;

  if (audio.paused) {
    shouldBePlaying = true;
    await startStream(current, true);
  } else {
    stopRecovery();
    audio.pause();
    setStatus("Peatatud");
    updateMiniPlayer();
  }
});

audio.addEventListener("playing", () => {
  reconnectAttempts = 0;
  clearReconnectTimer();
  setStatus("Live", true);
  if ("mediaSession" in navigator && "playbackState" in navigator.mediaSession) {
    navigator.mediaSession.playbackState = "playing";
  }
  updateMiniPlayer();
});

audio.addEventListener("pause", () => {
  if (!shouldBePlaying) {
    updateMiniPlayer();
    return;
  }
  setStatus("Taasesitus peatus. Proovin taastada…");
  scheduleReconnect("Heli peatus");
  if ("mediaSession" in navigator && "playbackState" in navigator.mediaSession) {
    navigator.mediaSession.playbackState = "paused";
  }
  updateMiniPlayer();
});

audio.addEventListener("stalled", () => {
  scheduleReconnect("Striim jäi seisma");
});

audio.addEventListener("ended", () => {
  scheduleReconnect("Striim lõppes");
});

audio.addEventListener("emptied", () => {
  scheduleReconnect("Striim tühjenes");
});

audio.addEventListener("error", () => {
  scheduleReconnect("Striimi viga");
});

document.addEventListener("visibilitychange", () => {
  if (!document.hidden && current && shouldBePlaying && audio.paused) {
    startStream(current, true);
  }
});

window.addEventListener("pageshow", () => {
  if (current && shouldBePlaying && audio.paused) {
    startStream(current, true);
  }
});

load();
setInterval(load, 15000);
</script>

</body>
