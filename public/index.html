<!DOCTYPE html>
<html lang="et">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RadioApp</title>

<link rel="preconnect" href="https://icecast.err.ee" crossorigin>

<style>
:root {
  --bg: linear-gradient(180deg, #f8f9fb 0%, #eef2f7 100%);
  --card: rgba(255, 255, 255, 0.78);
  --card-border: rgba(255, 255, 255, 0.85);
  --text: #111111;
  --text-secondary: #5f6672;
  --accent: #0a84ff;
  --accent-hover: #0066d6;
  --accent-shadow: rgba(13, 118, 255, 0.30);
  --shadow: 0 10px 30px rgba(18, 34, 66, 0.08);
  --shadow-strong: 0 18px 40px rgba(18, 34, 66, 0.14);
  --blur: blur(18px);

  --dynamic-1: rgba(76, 146, 255, 0.10);
  --dynamic-2: rgba(155, 193, 255, 0.08);
  --dynamic-detail: rgba(255,255,255,0.35);

  --detail-text: #ffffff;
  --detail-text-secondary: rgba(255,255,255,0.84);

  --overlay-top: rgba(255,255,255,0.16);
  --overlay-middle: rgba(10,18,32,0.18);
  --overlay-bottom: rgba(6,10,20,0.58);

  --bar-bg: rgba(255,255,255,0.72);
  --bar-border: rgba(255,255,255,0.7);
  --bar-pill: rgba(255,255,255,0.34);
  --bar-text: #111111;
}

body.dark {
  --bg: linear-gradient(180deg, #07111f 0%, #0b1930 35%, #102447 70%, #122a52 100%);
  --card: rgba(10, 25, 52, 0.65);
  --card-border: rgba(120, 170, 255, 0.10);
  --text: #edf4ff;
  --text-secondary: #a9bddc;
  --accent: #4da3ff;
  --accent-hover: #2d8eff;
  --accent-shadow: rgba(77, 163, 255, 0.32);
  --shadow: 0 12px 34px rgba(0, 0, 0, 0.34);
  --shadow-strong: 0 20px 46px rgba(0, 0, 0, 0.42);
  --dynamic-1: rgba(77, 163, 255, 0.12);
  --dynamic-2: rgba(18, 90, 200, 0.16);
  --dynamic-detail: rgba(6, 16, 34, 0.30);

  --detail-text: #ffffff;
  --detail-text-secondary: rgba(255,255,255,0.84);

  --overlay-top: rgba(255,255,255,0.04);
  --overlay-middle: rgba(8,14,26,0.30);
  --overlay-bottom: rgba(3,7,16,0.74);

  --bar-bg: rgba(7,17,31,0.72);
  --bar-border: rgba(255,255,255,0.08);
  --bar-pill: rgba(255,255,255,0.10);
  --bar-text: #f4f8ff;
}

html, body {
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text",
               "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  text-rendering: optimizeLegibility;
}

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  min-height: 100vh;
  color: var(--text);
  background:
    radial-gradient(circle at top left, var(--dynamic-1), transparent 28%),
    radial-gradient(circle at top right, var(--dynamic-2), transparent 26%),
    var(--bg);
  transition: background 0.35s ease, color 0.35s ease;
}

.page {
  max-width: 1180px;
  margin: 0 auto;
  padding: 18px 20px 126px;
}

.hero {
  position: sticky;
  top: 0;
  z-index: 20;
  text-align: center;
  padding: 18px 0 10px;
  background: transparent;
  transition: padding 0.22s ease;
}

.hero-inner {
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 44px;
}

.hero h1 {
  margin: 0;
  font-size: 30px;
  font-weight: 700;
  letter-spacing: -0.03em;
  opacity: 0.95;
  transition: font-size 0.22s ease, opacity 0.22s ease, transform 0.22s ease;
}

.hero-quality {
  position: absolute;
  right: 0;
  top: 50%;
  transform: translateY(-50%);
  z-index: 2;
  min-width: 58px;
  height: 34px;
  border-radius: 999px;
  border: none;
  background: rgba(0, 0, 0, 0.18);
  color: #fff;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  padding: 0 12px;
  font-size: 11px;
  font-weight: 800;
  letter-spacing: 0.08em;
  cursor: pointer;
  transition: transform 0.2s ease, background 0.2s ease, box-shadow 0.2s ease;
}

.hero-quality:hover {
  transform: translateY(-50%) scale(1.04);
  background: rgba(0, 0, 0, 0.28);
}

.hero-quality.active {
  background: var(--accent);
  box-shadow: 0 10px 22px var(--accent-shadow);
}

.hero-quality.active:hover {
  background: var(--accent-hover);
}

body.in-detail .hero-quality {
  display: none;
}

body.scrolled .hero {
  padding: 8px 0 6px;
}

body.scrolled .hero h1 {
  font-size: 20px;
  opacity: 0.9;
  transform: translateY(-1px);
}

.grid {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 22px;
}

.station {
  position: relative;
  overflow: hidden;
  border-radius: 28px;
  padding: 14px;
  background: var(--card);
  backdrop-filter: var(--blur);
  -webkit-backdrop-filter: var(--blur);
  border: 1px solid var(--card-border);
  box-shadow: var(--shadow);
  cursor: pointer;
  transition: transform 0.24s ease, box-shadow 0.24s ease, background 0.24s ease;
  touch-action: pan-y;
}

.station:hover {
  transform: translateY(-4px) scale(1.01);
  box-shadow: var(--shadow-strong);
}

.img-wrapper {
  width: 100%;
  aspect-ratio: 1 / 1;
  overflow: hidden;
  border-radius: 22px;
  background: #dcdce1;
}

body.dark .img-wrapper {
  background: #183158;
}

.img-wrapper img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}

.station-info {
  padding: 14px 6px 4px;
}

.station-name {
  font-size: 20px;
  font-weight: 700;
  letter-spacing: -0.02em;
  margin: 0 0 6px;
  line-height: 1.15;
}

.station-title {
  font-size: 14px;
  line-height: 1.35;
  color: var(--text-secondary);
  margin: 0;
  min-height: 38px;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.detail {
  display: none;
  max-width: 980px;
  margin: 0 auto;
}

.detail-shell {
  position: relative;
  overflow: hidden;
  display: grid;
  grid-template-columns: minmax(280px, 430px) minmax(280px, 1fr);
  gap: 34px;
  align-items: center;
  padding: 30px 24px 24px;
  border-radius: 34px;
  border: 1px solid var(--card-border);
  box-shadow: var(--shadow-strong);
  background: rgba(255,255,255,0.10);
  min-height: 420px;
}

.detail-bg {
  position: absolute;
  inset: 0;
  z-index: 0;
}

.detail-bg img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  transform: scale(1.18);
  filter: blur(40px) saturate(1.22) brightness(0.92);
  opacity: 0.96;
}

.detail-bg::after {
  content: "";
  position: absolute;
  inset: 0;
  background:
    linear-gradient(
      180deg,
      var(--overlay-top) 0%,
      var(--overlay-middle) 42%,
      var(--overlay-bottom) 100%
    );
}

.detail-overlay {
  position: absolute;
  inset: 0;
  z-index: 1;
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
}

.detail-back {
  position: absolute;
  top: 18px;
  left: 18px;
  z-index: 3;
  width: 42px;
  height: 42px;
  border-radius: 50%;
  border: none;
  background: rgba(0, 0, 0, 0.18);
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 26px;
  font-weight: 500;
  line-height: 1;
  cursor: pointer;
  transition: transform 0.2s ease, background 0.2s ease;
}

.detail-back:hover {
  transform: scale(1.05);
  background: rgba(0, 0, 0, 0.28);
}

.detail-art-wrap,
.detail-copy {
  position: relative;
  z-index: 2;
}

.detail-art-wrap {
  width: 88%;
  max-width: 360px;
  aspect-ratio: 1 / 1;
  border-radius: 30px;
  overflow: hidden;
  background: #dcdce1;
  box-shadow: 0 18px 44px rgba(0, 0, 0, 0.22);
  margin: 42px auto 0;
}

body.dark .detail-art-wrap {
  background: #163056;
}

.detail-art-wrap img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}

.detail-copy {
  text-align: left;
  color: var(--detail-text);
  margin-top: 8px;
}

.detail-status-wrap {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 12px;
}

.detail-status-label {
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--accent);
  text-shadow: 0 1px 8px rgba(0,0,0,0.25);
}

.live-waves {
  display: none;
  align-items: flex-end;
  gap: 3px;
  height: 16px;
}

.live-waves.active {
  display: inline-flex;
}

.live-waves span {
  width: 3px;
  border-radius: 999px;
  background: var(--accent);
  animation: liveWave 1s infinite ease-in-out;
}

.live-waves span:nth-child(1) { height: 6px; animation-delay: 0s; }
.live-waves span:nth-child(2) { height: 12px; animation-delay: 0.15s; }
.live-waves span:nth-child(3) { height: 8px; animation-delay: 0.3s; }
.live-waves span:nth-child(4) { height: 14px; animation-delay: 0.45s; }

@keyframes liveWave {
  0%, 100% { transform: scaleY(0.6); opacity: 0.7; }
  50% { transform: scaleY(1.25); opacity: 1; }
}

#name {
  margin: 0 0 12px;
  font-size: 46px;
  line-height: 0.95;
  font-weight: 800;
  letter-spacing: -0.05em;
  color: var(--detail-text);
  text-shadow: 0 3px 18px rgba(0,0,0,0.42);
}

#title {
  margin: 0 0 24px;
  font-size: 20px;
  line-height: 1.35;
  color: var(--detail-text-secondary);
  font-weight: 500;
  text-shadow: 0 2px 14px rgba(0,0,0,0.36);
}

.detail-actions {
  display: flex;
  align-items: center;
  gap: 14px;
  flex-wrap: wrap;
}

.play-toggle {
  width: 92px;
  height: 92px;
  border-radius: 50%;
  border: none;
  background: var(--accent);
  color: #fff;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-weight: 800;
  font-size: 15px;
  letter-spacing: 0.06em;
  cursor: pointer;
  user-select: none;
  box-shadow: 0 14px 28px var(--accent-shadow);
  transition: transform 0.2s ease, background 0.2s ease, box-shadow 0.2s ease;
}

.play-toggle:hover {
  transform: scale(1.05);
  background: var(--accent-hover);
}

audio {
  display: none;
}

.status-bar {
  position: fixed;
  left: 14px;
  right: 14px;
  bottom: 14px;
  z-index: 45;
  display: none;
  align-items: center;
  gap: 12px;
  padding: 10px 12px;
  border-radius: 24px;
  background: var(--bar-bg);
  border: 1px solid var(--bar-border);
  backdrop-filter: blur(18px);
  -webkit-backdrop-filter: blur(18px);
  box-shadow: var(--shadow-strong);
}

.status-bar.show {
  display: flex;
}

.status-art {
  width: 52px;
  height: 52px;
  border-radius: 14px;
  overflow: hidden;
  background: #dcdce1;
  flex: 0 0 auto;
}

body.dark .status-art {
  background: #183158;
}

.status-art img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}

.status-info {
  min-width: 0;
  flex: 1;
  display: flex;
  align-items: center;
  gap: 10px;
}

.status-track-wrap {
  min-width: 0;
  flex: 1;
  overflow: hidden;
  position: relative;
}

.status-track {
  min-width: 0;
  flex: 1;
  font-size: 14px;
  font-weight: 600;
  color: var(--bar-text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

body.mobile-marquee .status-track {
  display: inline-block;
  min-width: max-content;
  padding-right: 40px;
  overflow: visible;
  text-overflow: clip;
  animation: statusMarquee 10s linear infinite;
}

@keyframes statusMarquee {
  0% { transform: translateX(0); }
  10% { transform: translateX(0); }
  90% { transform: translateX(calc(-100% + 220px)); }
  100% { transform: translateX(0); }
}

.status-station {
  flex: 0 0 auto;
  font-size: 12px;
  font-weight: 700;
  color: var(--bar-text);
  padding: 7px 12px;
  border-radius: 999px;
  background: var(--bar-pill);
  border: 1px solid rgba(255,255,255,0.10);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
}

.status-actions {
  display: flex;
  align-items: center;
  gap: 8px;
  flex: 0 0 auto;
}

.bar-btn {
  min-width: 58px;
  height: 38px;
  padding: 0 14px;
  border-radius: 999px;
  border: none;
  background: var(--accent);
  color: #fff;
  font-size: 11px;
  font-weight: 800;
  letter-spacing: 0.08em;
  cursor: pointer;
  box-shadow: 0 10px 22px var(--accent-shadow);
  transition: transform 0.2s ease, background 0.2s ease;
}

.bar-btn:hover {
  transform: scale(1.03);
  background: var(--accent-hover);
}

@media (max-width: 980px) {
  .hero h1 { font-size: 30px; }
  .grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
  .detail-shell { grid-template-columns: 1fr; gap: 22px; }
  .detail-copy { text-align: center; }
  .detail-actions { justify-content: center; }
  .detail-status-wrap { justify-content: center; }
  .detail-back { top: 14px; left: 14px; }
  #name { font-size: 38px; }
  #title { font-size: 18px; }
}

@media (max-width: 500px) {
  .page { padding: 14px 12px 106px; }
  .hero { padding-top: 14px; }
  .hero h1 { font-size: 28px; }
  body.scrolled .hero h1 { font-size: 20px; }

  .hero-quality {
    min-width: 52px;
    height: 32px;
    font-size: 10px;
    padding: 0 10px;
  }

  .grid { grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 14px; }
  .station { border-radius: 20px; padding: 10px; }
  .img-wrapper { border-radius: 16px; }
  .station-info { padding: 10px 2px 2px; }
  .station-name { font-size: 15px; }
  .station-title { font-size: 12px; min-height: 32px; }

  .detail-shell { padding: 16px; border-radius: 24px; min-height: auto; }
  .detail-back {
    top: 10px;
    left: 10px;
    width: 42px;
    height: 42px;
    font-size: 20px;
  }
  .detail-art-wrap {
    width: 84%;
    max-width: 300px;
    border-radius: 22px;
    margin: 34px auto 0;
  }
  #name { font-size: 28px; }
  #title { font-size: 16px; }
  .play-toggle { width: 74px; height: 74px; font-size: 13px; }

  .status-bar {
    left: 10px;
    right: 10px;
    bottom: 10px;
    gap: 8px;
    padding: 8px 9px;
    border-radius: 20px;
  }

  .status-art {
    width: 44px;
    height: 44px;
    border-radius: 12px;
  }

  .status-track {
    font-size: 12px;
  }

  .status-station {
    font-size: 11px;
    padding: 6px 10px;
  }

  .bar-btn {
    min-width: 52px;
    height: 34px;
    font-size: 10px;
    padding: 0 12px;
  }
}
</style>
</head>

<body>

<div class="page">
  <div class="hero">
    <div class="hero-inner">
      <h1>RadioApp</h1>
      <button id="qualityToggle" class="hero-quality" type="button" aria-label="Helikvaliteet">LOW</button>
    </div>
  </div>

  <div id="grid" class="grid"></div>

  <div id="detail" class="detail">
    <div class="detail-shell">
      <div class="detail-bg">
        <img id="bgArt" alt="">
      </div>
      <div class="detail-overlay"></div>

      <button class="detail-back" onclick="back()" aria-label="Tagasi">‹</button>

      <div class="detail-art-wrap">
        <img id="art" alt="">
      </div>

      <div class="detail-copy">
        <div class="detail-status-wrap">
          <div id="detailStatus" class="detail-status-label">STOPPED</div>
          <div id="liveWaves" class="live-waves" aria-hidden="true">
            <span></span><span></span><span></span><span></span>
          </div>
        </div>

        <h2 id="name"></h2>
        <p id="title"></p>

        <div class="detail-actions">
          <button id="playToggle" class="play-toggle" onclick="togglePlayback()">PLAY</button>
        </div>
      </div>
    </div>
  </div>
</div>

<div id="statusBar" class="status-bar">
  <div class="status-art">
    <img id="statusArt" alt="">
  </div>

  <div class="status-info">
    <div class="status-track-wrap">
      <div id="statusTrack" class="status-track">Peatatud</div>
    </div>
    <div id="statusStation" class="status-station">RadioApp</div>
  </div>

  <div class="status-actions">
    <button id="barToggleBtn" class="bar-btn">PLAY</button>
  </div>
</div>

<audio id="audio" preload="auto" playsinline></audio>

<script>
let stations = [];
let cache = {};
let current = null;

const audio = document.getElementById("audio");
const playToggle = document.getElementById("playToggle");
const detailStatus = document.getElementById("detailStatus");
const liveWaves = document.getElementById("liveWaves");

const statusBar = document.getElementById("statusBar");
const statusArt = document.getElementById("statusArt");
const statusTrack = document.getElementById("statusTrack");
const statusStation = document.getElementById("statusStation");
const barToggleBtn = document.getElementById("barToggleBtn");
const qualityToggle = document.getElementById("qualityToggle");

let shouldBePlaying = false;
let reconnectTimer = null;
let reconnectAttempts = 0;
let loadingInterval = null;
let loadingDots = 0;
let qualityMode = localStorage.getItem("radio_quality_mode") === "high" ? "high" : "low";

const highQualityStreams = {
  "R2": "https://icecast.err.ee/raadio2korge.mp3",
  "R2AltPop": "https://icecast.err.ee/r2alternatiivkorge.mp3",
  "R2Chill": "https://icecast.err.ee/r2chillkorge.mp3",
  "R2Eesti": "https://icecast.err.ee/r2eestikorge.mp3",
  "R2Millenium": "https://icecast.err.ee/r2music.mp3",
  "R2Räp": "https://icecast.err.ee/r2pkorge.mp3",
  "R2Rock": "https://icecast.err.ee/r2rockkorge.mp3",
  "R2Pop": "https://icecast.err.ee/r2popkorge.mp3",
  "KlaraNostalgia": "https://icecast.err.ee/klaranostalgiakorge.mp3",
  "KlaraJazz": "https://icecast.err.ee/klarajazzkorge.mp3",
  "R4Retro": "https://icecast.err.ee/r4retrokorge.mp3",
  "Raadio Tallinn": "https://icecast.err.ee/raadiotallinnkorge.mp3"
};

function darkMode() {
  const h = new Date().getHours();
  if (h >= 19 || h < 7) {
    document.body.classList.add("dark");
  } else {
    document.body.classList.remove("dark");
  }
}

function updateScrollHeader() {
  document.body.classList.toggle("scrolled", window.scrollY > 12);
}

function updateMobileMarquee() {
  document.body.classList.toggle("mobile-marquee", window.innerWidth <= 500);
}

function updateQualityButton() {
  const isHigh = qualityMode === "high";
  qualityToggle.textContent = isHigh ? "HIGH" : "LOW";
  qualityToggle.classList.toggle("active", isHigh);
}

function getStreamForStation(station) {
  if (!station) return "";
  if (qualityMode === "high" && highQualityStreams[station.name]) {
    return highQualityStreams[station.name];
  }
  return station.stream;
}

function updatePageTitle() {
  if (current && shouldBePlaying && !audio.paused) {
    document.title = current.name || "RadioApp";
  } else {
    document.title = "RadioApp";
  }
}

function setStatus(text, isLive = false) {
  if (loadingInterval) {
    clearInterval(loadingInterval);
    loadingInterval = null;
  }

  if (text === "LOADING") {
    loadingDots = 0;
    if (detailStatus) detailStatus.textContent = "LOADING";

    loadingInterval = setInterval(() => {
      loadingDots = (loadingDots + 1) % 5;
      const dots = ".".repeat(loadingDots);
      if (detailStatus) detailStatus.textContent = "LOADING" + dots;
    }, 400);
  } else {
    if (detailStatus) detailStatus.textContent = text;
  }

  if (liveWaves) {
    liveWaves.classList.toggle("active", isLive);
  }
}

function setToggleLabels() {
  const label = (!audio.paused && current) ? "STOP" : "PLAY";
  playToggle.textContent = label;
  barToggleBtn.textContent = label;
}

function restartStatusMarqueeIfNeeded() {
  if (document.body.classList.contains("mobile-marquee")) {
    statusTrack.style.animation = "none";
    void statusTrack.offsetWidth;
    statusTrack.style.animation = "";
  }
}

function updateStatusBar() {
  if (!current) {
    statusBar.classList.remove("show");
    return;
  }

  const s = cache[current.name] || current;
  const img = s.artwork || "/images/" + s.name.toLowerCase() + ".png";

  statusArt.src = img;
  statusArt.alt = s.name;
  statusTrack.textContent = s.title || "Peatatud";
  statusStation.textContent = s.name;

  statusBar.classList.add("show");
  restartStatusMarqueeIfNeeded();
}

function clearReconnectTimer() {
  if (reconnectTimer) {
    clearTimeout(reconnectTimer);
    reconnectTimer = null;
  }
}

function stopPlaybackForInterruption() {
  shouldBePlaying = false;
  reconnectAttempts = 0;
  clearReconnectTimer();

  audio.pause();
  audio.removeAttribute("src");
  audio.load();

  setStatus("STOPPED", false);

  if ("mediaSession" in navigator && "playbackState" in navigator.mediaSession) {
    navigator.mediaSession.playbackState = "paused";
  }

  setToggleLabels();
  updateStatusBar();
  updatePageTitle();
}

function scheduleReconnect() {
  if (!current || !shouldBePlaying) return;
  if (reconnectTimer) return;

  reconnectAttempts += 1;
  const delay = Math.min(700 * reconnectAttempts, 3000);
  setStatus("LOADING", false);

  reconnectTimer = setTimeout(() => {
    reconnectTimer = null;
    stopPlaybackForInterruption();
  }, delay);
}

function rgbToCss(r, g, b, a = 0.18) {
  return `rgba(${r}, ${g}, ${b}, ${a})`;
}

function applyGradientOverlay(r, g, b, brightness) {
  const root = document.documentElement;
  const isBright = brightness > 160;

  if (isBright) {
    root.style.setProperty("--overlay-top", "rgba(255,255,255,0.08)");
    root.style.setProperty("--overlay-middle", "rgba(12,18,30,0.22)");
    root.style.setProperty("--overlay-bottom", "rgba(4,8,18,0.72)");
  } else {
    root.style.setProperty("--overlay-top", "rgba(255,255,255,0.05)");
    root.style.setProperty("--overlay-middle", "rgba(10,18,32,0.24)");
    root.style.setProperty("--overlay-bottom", "rgba(4,8,18,0.78)");
  }

  root.style.setProperty("--detail-text", "#ffffff");
  root.style.setProperty("--detail-text-secondary", "rgba(255,255,255,0.84)");
}

function applyDynamicAccent(r, g, b, brightness) {
  const root = document.documentElement;

  const redDominant = r > g + 25 && r > b + 25;
  const blueDominant = b > r + 20 && b > g + 10;
  const greenDominant = g > r + 20 && g > b + 10;
  const veryBright = brightness > 185;

  if (veryBright) {
    if (redDominant) {
      root.style.setProperty("--accent", "#ff5a52");
      root.style.setProperty("--accent-hover", "#e44840");
      root.style.setProperty("--accent-shadow", "rgba(255, 90, 82, 0.34)");
    } else {
      root.style.setProperty("--accent", "#3f95ff");
      root.style.setProperty("--accent-hover", "#1f7ef5");
      root.style.setProperty("--accent-shadow", "rgba(63, 149, 255, 0.34)");
    }
    return;
  }

  if (redDominant) {
    root.style.setProperty("--accent", "#ff5a52");
    root.style.setProperty("--accent-hover", "#e44840");
    root.style.setProperty("--accent-shadow", "rgba(255, 90, 82, 0.34)");
    return;
  }

  if (blueDominant) {
    root.style.setProperty("--accent", "#64b0ff");
    root.style.setProperty("--accent-hover", "#459eff");
    root.style.setProperty("--accent-shadow", "rgba(100, 176, 255, 0.34)");
    return;
  }

  if (greenDominant) {
    root.style.setProperty("--accent", "#38d86a");
    root.style.setProperty("--accent-hover", "#2fc25f");
    root.style.setProperty("--accent-shadow", "rgba(56, 216, 106, 0.32)");
    return;
  }

  root.style.setProperty("--accent", "#64b0ff");
  root.style.setProperty("--accent-hover", "#459eff");
  root.style.setProperty("--accent-shadow", "rgba(100, 176, 255, 0.34)");
}

function applyDynamicThemeFromImage(imgEl) {
  try {
    const canvas = document.createElement("canvas");
    const ctx = canvas.getContext("2d", { willReadFrequently: true });
    if (!ctx) return;

    const size = 32;
    canvas.width = size;
    canvas.height = size;
    ctx.drawImage(imgEl, 0, 0, size, size);

    const data = ctx.getImageData(0, 0, size, size).data;

    let r = 0, g = 0, b = 0, count = 0;

    for (let i = 0; i < data.length; i += 4) {
      const alpha = data[i + 3];
      if (alpha < 120) continue;
      r += data[i];
      g += data[i + 1];
      b += data[i + 2];
      count++;
    }

    if (!count) return;

    r = Math.round(r / count);
    g = Math.round(g / count);
    b = Math.round(b / count);

    const brightness = (r * 299 + g * 587 + b * 114) / 1000;

    applyDynamicAccent(r, g, b, brightness);
    applyGradientOverlay(r, g, b, brightness);

    const root = document.documentElement;
    root.style.setProperty("--dynamic-1", rgbToCss(r, g, b, 0.16));
    root.style.setProperty("--dynamic-2", rgbToCss(Math.max(0, r - 30), Math.max(0, g - 10), Math.min(255, b + 20), 0.18));

    if (document.body.classList.contains("dark")) {
      root.style.setProperty("--dynamic-detail", `rgba(${Math.max(0,r-80)}, ${Math.max(0,g-80)}, ${Math.max(0,b-80)}, 0.28)`);
    } else {
      root.style.setProperty("--dynamic-detail", `rgba(${Math.min(255,r+100)}, ${Math.min(255,g+100)}, ${Math.min(255,b+100)}, 0.18)`);
    }
  } catch {}
}

async function startStream(station) {
  if (!station) return;

  current = station;
  shouldBePlaying = true;
  clearReconnectTimer();

  const streamUrl = getStreamForStation(station);

  try {
    setStatus("LOADING", false);

    const currentSrc = audio.getAttribute("src") || "";

    if (currentSrc !== streamUrl) {
      audio.pause();
      audio.setAttribute("src", streamUrl);
      audio.load();
    } else if (audio.paused) {
      audio.load();
    }

    const playPromise = audio.play();
    if (playPromise && typeof playPromise.then === "function") {
      await playPromise;
    }
  } catch {
    scheduleReconnect();
  }

  setToggleLabels();
  updateStatusBar();
  updatePageTitle();
}

function stopPlayback(resetCurrent = false) {
  shouldBePlaying = false;
  reconnectAttempts = 0;
  clearReconnectTimer();

  audio.pause();
  audio.removeAttribute("src");
  audio.load();

  setStatus("STOPPED", false);

  if ("mediaSession" in navigator && "playbackState" in navigator.mediaSession) {
    navigator.mediaSession.playbackState = "paused";
  }

  if (resetCurrent) {
    current = null;
  }

  setToggleLabels();
  updateStatusBar();
  updatePageTitle();
}

function togglePlayback() {
  if (!current) return;

  if (!audio.paused) {
    stopPlayback(false);
  } else {
    shouldBePlaying = true;
    startStream(current);
  }
}

async function load() {
  try {
    const res = await fetch("/api/stations");
    stations = await res.json();
    stations.forEach(s => {
      cache[s.name] = s;
    });
    render();
    updateDetail();
    updateStatusBar();
    setToggleLabels();
    updatePageTitle();
  } catch (e) {
    console.log("Load error:", e);
  }
}

function render() {
  const g = document.getElementById("grid");
  g.innerHTML = "";

  stations.forEach(s => {
    const d = document.createElement("div");
    d.className = "station";

    const img = s.artwork || "/images/" + s.name.toLowerCase() + ".png";

    d.innerHTML = `
      <div class="img-wrapper">
        <img src="${img}" alt="${s.name}">
      </div>
      <div class="station-info">
        <div class="station-name">${s.name}</div>
        <div class="station-title">${s.title}</div>
      </div>
    `;

    d.addEventListener("click", () => openStation(s));
    g.appendChild(d);
  });
}

function openStation(s) {
  const sameStation = current && current.name === s.name;

  current = s;
  document.body.classList.add("in-detail");
  document.getElementById("grid").style.display = "none";
  document.getElementById("detail").style.display = "block";

  updateDetail();

  if (!sameStation || audio.paused || !shouldBePlaying) {
    startStream(s);
  }

  updateStatusBar();
  setToggleLabels();
  updatePageTitle();
}

function updateDetail() {
  if (!current) return;

  const s = cache[current.name];
  if (!s) return;

  const img = s.artwork || "/images/" + s.name.toLowerCase() + ".png";

  document.getElementById("name").textContent = s.name;
  document.getElementById("title").textContent = s.title;
  document.getElementById("art").src = img;
  document.getElementById("art").alt = s.name;
  document.getElementById("bgArt").src = img;
  document.getElementById("bgArt").alt = s.name;

  const probe = new Image();
  probe.crossOrigin = "anonymous";
  probe.onload = () => applyDynamicThemeFromImage(probe);
  probe.src = img;

  if ("mediaSession" in navigator) {
    navigator.mediaSession.metadata = new MediaMetadata({
      title: s.title,
      artist: s.name,
      album: "RadioApp",
      artwork: [
        { src: img, sizes: "96x96", type: "image/png" },
        { src: img, sizes: "192x192", type: "image/png" },
        { src: img, sizes: "400x400", type: "image/png" },
        { src: img, sizes: "512x512", type: "image/png" }
      ]
    });

    navigator.mediaSession.setActionHandler("play", async () => {
      shouldBePlaying = true;
      await startStream(current || s);
    });

    navigator.mediaSession.setActionHandler("pause", () => {
      stopPlayback(false);
    });

    try {
      navigator.mediaSession.setActionHandler("stop", () => {
        stopPlayback(false);
      });
    } catch {}

    try {
      navigator.mediaSession.setActionHandler("seekbackward", null);
      navigator.mediaSession.setActionHandler("seekforward", null);
      navigator.mediaSession.setActionHandler("previoustrack", null);
      navigator.mediaSession.setActionHandler("nexttrack", null);
    } catch {}

    if ("playbackState" in navigator.mediaSession) {
      navigator.mediaSession.playbackState = shouldBePlaying && !audio.paused ? "playing" : "paused";
    }
  }

  setToggleLabels();
}

function back() {
  document.body.classList.remove("in-detail");
  document.getElementById("detail").style.display = "none";
  document.getElementById("grid").style.display = "grid";
  updatePageTitle();
}

audio.addEventListener("playing", () => {
  reconnectAttempts = 0;
  clearReconnectTimer();
  setStatus("LIVE", true);

  if ("mediaSession" in navigator && "playbackState" in navigator.mediaSession) {
    navigator.mediaSession.playbackState = "playing";
  }

  updateStatusBar();
  setToggleLabels();
  updatePageTitle();
});

audio.addEventListener("pause", () => {
  if (!shouldBePlaying) {
    updateStatusBar();
    setToggleLabels();
    updatePageTitle();
    return;
  }

  stopPlaybackForInterruption();
});

audio.addEventListener("stalled", () => {
  stopPlaybackForInterruption();
});

audio.addEventListener("ended", () => {
  stopPlaybackForInterruption();
});

audio.addEventListener("emptied", () => {
  stopPlaybackForInterruption();
});

audio.addEventListener("error", () => {
  stopPlaybackForInterruption();
});

document.addEventListener("visibilitychange", () => {
  if (document.hidden && current && !audio.paused) {
    stopPlaybackForInterruption();
  }
});

window.addEventListener("pageshow", () => {
  updatePageTitle();
  setToggleLabels();
  updateStatusBar();
});

barToggleBtn.addEventListener("click", () => {
  if (!current) return;
  togglePlayback();
});

qualityToggle.addEventListener("click", async () => {
  qualityMode = qualityMode === "low" ? "high" : "low";
  localStorage.setItem("radio_quality_mode", qualityMode);
  updateQualityButton();

  if (current && shouldBePlaying) {
    await startStream(current);
  }
});

window.addEventListener("scroll", updateScrollHeader, { passive: true });
window.addEventListener("resize", updateMobileMarquee);

darkMode();
updateScrollHeader();
updateMobileMarquee();
updateQualityButton();
updatePageTitle();
load();
setInterval(load, 15000);
</script>
