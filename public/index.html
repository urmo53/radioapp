<!DOCTYPE html>
<html lang="et">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RadioApp</title>

<link rel="preconnect" href="https://icecast.err.ee" crossorigin>

<style>
:root {
  --bg: #f5f5f7;
  --bg-secondary: #ffffffcc;
  --card: rgba(255, 255, 255, 0.72);
  --card-border: rgba(255, 255, 255, 0.7);
  --text: #111111;
  --text-secondary: #6e6e73;
  --accent: #fa233b;
  --accent-hover: #d91e33;
  --shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
  --shadow-strong: 0 18px 40px rgba(0, 0, 0, 0.14);
  --blur: blur(18px);
}

body.dark {
  --bg: linear-gradient(180deg, #101113 0%, #17181c 100%);
  --bg-secondary: rgba(28, 28, 30, 0.75);
  --card: rgba(28, 28, 30, 0.72);
  --card-border: rgba(255, 255, 255, 0.06);
  --text: #f5f5f7;
  --text-secondary: #a1a1a6;
  --accent: #ff375f;
  --accent-hover: #ff1f4b;
  --shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
  --shadow-strong: 0 18px 40px rgba(0, 0, 0, 0.38);
}

html, body {
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text",
               "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  text-rendering: optimizeLegibility;
}

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  min-height: 100vh;
  color: var(--text);
  background:
    radial-gradient(circle at top left, rgba(255, 120, 140, 0.12), transparent 30%),
    radial-gradient(circle at top right, rgba(90, 120, 255, 0.08), transparent 28%),
    var(--bg);
  transition: background 0.35s ease, color 0.35s ease;
}

.page {
  max-width: 1180px;
  margin: 0 auto;
  padding: 26px 20px 40px;
}

.hero {
  text-align: center;
  margin-bottom: 28px;
}

.hero h1 {
  margin: 0;
  font-size: 40px;
  font-weight: 800;
  letter-spacing: -0.04em;
}

.hero p {
  margin: 8px 0 0;
  font-size: 16px;
  color: var(--text-secondary);
  font-weight: 500;
}

.grid {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 22px;
}

.station {
  position: relative;
  overflow: hidden;
  border-radius: 28px;
  padding: 14px;
  background: var(--card);
  backdrop-filter: var(--blur);
  -webkit-backdrop-filter: var(--blur);
  border: 1px solid var(--card-border);
  box-shadow: var(--shadow);
  cursor: pointer;
  transition: transform 0.24s ease, box-shadow 0.24s ease, background 0.24s ease;
}

.station:hover {
  transform: translateY(-4px) scale(1.01);
  box-shadow: var(--shadow-strong);
}

.station::after {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(to top, rgba(0, 0, 0, 0.10), transparent 40%);
  pointer-events: none;
  opacity: 0.65;
}

.img-wrapper {
  position: relative;
  width: 100%;
  aspect-ratio: 1 / 1;
  overflow: hidden;
  border-radius: 22px;
  background: #dcdce1;
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.24);
}

body.dark .img-wrapper {
  background: #2b2b31;
}

.img-wrapper img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}

.station-info {
  padding: 14px 6px 4px;
  position: relative;
  z-index: 1;
}

.station-name {
  font-size: 20px;
  font-weight: 700;
  letter-spacing: -0.02em;
  margin: 0 0 6px;
  line-height: 1.15;
}

.station-title {
  font-size: 14px;
  line-height: 1.35;
  color: var(--text-secondary);
  margin: 0;
  min-height: 38px;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.detail {
  display: none;
  max-width: 980px;
  margin: 0 auto;
}

.detail-shell {
  display: grid;
  grid-template-columns: minmax(280px, 430px) minmax(280px, 1fr);
  gap: 34px;
  align-items: center;
  background: var(--bg-secondary);
  backdrop-filter: var(--blur);
  -webkit-backdrop-filter: var(--blur);
  border: 1px solid var(--card-border);
  box-shadow: var(--shadow-strong);
  border-radius: 34px;
  padding: 24px;
}

.detail-art-wrap {
  width: 100%;
  aspect-ratio: 1 / 1;
  border-radius: 30px;
  overflow: hidden;
  background: #dcdce1;
  box-shadow: 0 18px 44px rgba(0, 0, 0, 0.16);
}

body.dark .detail-art-wrap {
  background: #2b2b31;
}

.detail-art-wrap img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}

.detail-copy {
  text-align: left;
}

.detail-label {
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 12px;
}

#name {
  margin: 0 0 12px;
  font-size: 46px;
  line-height: 0.95;
  font-weight: 800;
  letter-spacing: -0.05em;
}

#title {
  margin: 0 0 10px;
  font-size: 20px;
  line-height: 1.35;
  color: var(--text-secondary);
  font-weight: 500;
}

.player-status {
  margin: 0 0 26px;
  font-size: 14px;
  color: var(--text-secondary);
}

.detail-actions {
  display: flex;
  align-items: center;
  gap: 14px;
  flex-wrap: wrap;
}

.back {
  width: 92px;
  height: 92px;
  border-radius: 50%;
  background: var(--accent);
  color: #fff;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-weight: 800;
  font-size: 15px;
  letter-spacing: 0.06em;
  cursor: pointer;
  user-select: none;
  box-shadow: 0 14px 26px rgba(250, 35, 59, 0.32);
  transition: transform 0.2s ease, background 0.2s ease, box-shadow 0.2s ease;
}

.back:hover {
  transform: scale(1.05);
  background: var(--accent-hover);
}

.detail-note {
  font-size: 14px;
  color: var(--text-secondary);
  font-weight: 500;
}

audio {
  display: none;
}

@media (max-width: 980px) {
  .hero h1 { font-size: 34px; }
  .grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
  .detail-shell { grid-template-columns: 1fr; gap: 22px; }
  .detail-copy { text-align: center; }
  .detail-actions { justify-content: center; }
  #name { font-size: 38px; }
  #title { font-size: 18px; }
}

@media (max-width: 500px) {
  .page { padding: 18px 12px 28px; }
  .hero { margin-bottom: 20px; }
  .hero h1 { font-size: 28px; }
  .hero p { font-size: 14px; }
  .grid { grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 14px; }
  .station { border-radius: 20px; padding: 10px; }
  .img-wrapper { border-radius: 16px; }
  .station-info { padding: 10px 2px 2px; }
  .station-name { font-size: 15px; }
  .station-title { font-size: 12px; min-height: 32px; }
  .detail-shell { padding: 16px; border-radius: 24px; }
  .detail-art-wrap { border-radius: 22px; }
  #name { font-size: 28px; }
  #title { font-size: 16px; }
  .player-status { font-size: 13px; margin-bottom: 18px; }
  .back { width: 74px; height: 74px; font-size: 13px; }
  .detail-note { font-size: 13px; }
}
</style>
</head>

<body>

<div class="page">
  <div class="hero">
    <h1>RadioApp</h1>
    <p>Vali jaam</p>
  </div>

  <div id="grid" class="grid"></div>

  <div id="detail" class="detail">
    <div class="detail-shell">
      <div class="detail-art-wrap">
        <img id="art" alt="">
      </div>

      <div class="detail-copy">
        <div class="detail-label">Now Playing</div>
        <h2 id="name"></h2>
        <p id="title"></p>
        <p id="playerStatus" class="player-status">Ühendan…</p>

        <div class="detail-actions">
          <div class="back" onclick="back()">BACK</div>
          <div class="detail-note"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<audio id="audio" preload="auto" playsinline></audio>

<script>
let stations = [];
let cache = {};
let current = null;

const audio = document.getElementById("audio");
const playerStatus = document.getElementById("playerStatus");

let shouldBePlaying = false;
let reconnectTimer = null;
let reconnectAttempts = 0;

function darkMode() {
  let h = new Date().getHours();
  if (h >= 19 || h < 7) {
    document.body.classList.add("dark");
  } else {
    document.body.classList.remove("dark");
  }
}
darkMode();

function setStatus(text) {
  if (playerStatus) playerStatus.textContent = text;
}

function clearReconnectTimer() {
  if (reconnectTimer) {
    clearTimeout(reconnectTimer);
    reconnectTimer = null;
  }
}

function scheduleReconnect(reason = "Katkestus") {
  if (!current || !shouldBePlaying) return;
  if (reconnectTimer) return;

  reconnectAttempts += 1;
  const delay = Math.min(700 * reconnectAttempts, 3000);

  setStatus(`${reason}. Proovin uuesti ${Math.max(1, Math.round(delay / 1000))} s pärast…`);

  reconnectTimer = setTimeout(() => {
    reconnectTimer = null;
    startStream(current, true);
  }, delay);
}

async function startStream(station, isReconnect = false) {
  if (!station) return;

  current = station;
  shouldBePlaying = true;
  clearReconnectTimer();

  const streamUrl = station.stream;

  try {
    setStatus(isReconnect ? "Taastan live striimi…" : "Ühendan live striimiga…");

    if (!audio.src || audio.src !== streamUrl) {
      audio.src = streamUrl;
    }

    const playPromise = audio.play();
    if (playPromise && typeof playPromise.then === "function") {
      await playPromise;
    }
  } catch (err) {
    setStatus("Automaatne taastamine ei õnnestunud. Proovin uuesti…");
    scheduleReconnect("Mängimine ei käivitunud");
  }
}

function stopRecovery() {
  shouldBePlaying = false;
  reconnectAttempts = 0;
  clearReconnectTimer();
}

async function load() {
  let res = await fetch("/api/stations");
  stations = await res.json();

  stations.forEach(s => cache[s.name] = s);

  render();
  updateDetail();
}

function render() {
  let g = document.getElementById("grid");
  g.innerHTML = "";

  stations.forEach(s => {
    let d = document.createElement("div");
    d.className = "station";

    let img = s.artwork || "/images/" + s.name.toLowerCase() + ".png";

    d.innerHTML = `
      <div class="img-wrapper">
        <img src="${img}" alt="${s.name}">
      </div>
      <div class="station-info">
        <div class="station-name">${s.name}</div>
        <div class="station-title">${s.title}</div>
      </div>
    `;

    d.addEventListener("pointerdown", () => openStation(s), { once: true });
    d.addEventListener("click", () => openStation(s));
    g.appendChild(d);
  });
}

function openStation(s) {
  const sameStation = current && current.name === s.name;

  current = s;

  document.getElementById("grid").style.display = "none";
  document.getElementById("detail").style.display = "block";

  updateDetail();

  if (!sameStation || audio.paused || !shouldBePlaying) {
    startStream(s, false);
  }
}

function updateDetail() {
  if (!current) return;

  let s = cache[current.name];
  if (!s) return;

  let img = s.artwork || "/images/" + s.name.toLowerCase() + ".png";

  document.getElementById("name").innerText = s.name;
  document.getElementById("title").innerText = s.title;
  document.getElementById("art").src = img;
  document.getElementById("art").alt = s.name;

  if ("mediaSession" in navigator) {
    navigator.mediaSession.metadata = new MediaMetadata({
      title: s.title,
      artist: s.name,
      artwork: [{ src: img, sizes: "400x400", type: "image/png" }]
    });

    navigator.mediaSession.setActionHandler("play", async () => {
      shouldBePlaying = true;
      await startStream(current || s, true);
    });

    navigator.mediaSession.setActionHandler("pause", () => {
      stopRecovery();
      audio.pause();
      setStatus("Peatatud");
    });

    if ("playbackState" in navigator.mediaSession) {
      navigator.mediaSession.playbackState = shouldBePlaying ? "playing" : "paused";
    }
  }
}

function back() {
  document.getElementById("detail").style.display = "none";
  document.getElementById("grid").style.display = "grid";
  current = null;
  setStatus("Peatatud");
}

audio.addEventListener("playing", () => {
  reconnectAttempts = 0;
  clearReconnectTimer();
  setStatus("Mängin live...");
  if ("mediaSession" in navigator && "playbackState" in navigator.mediaSession) {
    navigator.mediaSession.playbackState = "playing";
  }
});

audio.addEventListener("pause", () => {
  if (!shouldBePlaying) return;
  setStatus("Taasesitus peatus. Proovin taastada…");
  scheduleReconnect("Heli peatus");
  if ("mediaSession" in navigator && "playbackState" in navigator.mediaSession) {
    navigator.mediaSession.playbackState = "paused";
  }
});

audio.addEventListener("stalled", () => {
  scheduleReconnect("Striim jäi seisma");
});

audio.addEventListener("ended", () => {
  scheduleReconnect("Striim lõppes");
});

audio.addEventListener("emptied", () => {
  scheduleReconnect("Striim tühjenes");
});

audio.addEventListener("error", () => {
  scheduleReconnect("Striimi viga");
});

document.addEventListener("visibilitychange", () => {
  if (!document.hidden && current && shouldBePlaying && audio.paused) {
    startStream(current, true);
  }
});

window.addEventListener("pageshow", () => {
  if (current && shouldBePlaying && audio.paused) {
    startStream(current, true);
  }
});

load();
setInterval(load, 15000);
</script>

</body>
</html>
